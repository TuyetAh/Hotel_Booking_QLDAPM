{% extends 'layout/base.html' %}

{% block title %}Đăng ký{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-box">
            <h2>Đăng ký tài khoản</h2>

            {% if err_msg %}
                <div class="form-message error">
                    {{ err_msg }}
                </div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập">
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" name="phone" placeholder="Nhập số điện thoại">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email">
                </div>

                <div class="form-group">
                    <label for="bank_account">Số tài khoản ngân hàng</label>
                    <input type="text" id="bank_account" name="bank_account" placeholder="Nhập số tài khoản ngân hàng (nếu có)">
                </div>

                <button type="submit" class="btn btn-primary full-width">Đăng ký</button>
            </form>

            <p class="auth-note">
                Đã có tài khoản?
                <a href="{{ url_for('dang_nhap') }}">Đăng nhập</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
